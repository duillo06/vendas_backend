name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t foodservice-api:staging .

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd ~/foodservice/vendas_backend
            git pull origin develop
            cp .env.production.example .env.production 2>/dev/null || true
            docker compose -f deploy/docker-compose.prod.yml pull || true
            docker compose -f deploy/docker-compose.prod.yml up -d --build
            docker compose -f deploy/docker-compose.prod.yml exec -T api python manage.py migrate --noinput
